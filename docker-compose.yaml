services:
  db:
    image: postgres:16-alpine
    container_name: task-time-tracker-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_TIME_TRACKER_DB}
      POSTGRES_USER: ${POSTGRES_TIME_TRACKER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TIME_TRACKER_PASSWORD}
      TZ: ${APP_TIMEZONE}
    ports:
      - "${POSTGRES_TIME_TRACKER_DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.4.0
    container_name: task-time-tracker-redis
    restart: unless-stopped
    ports:
      - "${TIME_TRACKER_REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-time-tracker-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${APP_TIMEZONE}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIMEZONE}
      TIME_TRACKER_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_TIME_TRACKER_DB}
      TIME_TRACKER_REDIS_HOST: redis
      TIME_TRACKER_REDIS_PORT: 6379
      TIME_TRACKER_OPENAPI_SERVER_URL: http://localhost:${TIME_TRACKER_SERVER_PORT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${TIME_TRACKER_SERVER_PORT}:8090"

volumes:
  postgres_data:
